# ============================================================
# nginx/nginx.conf
# Reverse proxy: HTTPS → fastliaison-gateway:8001
# Replace YOUR_DOMAIN with your actual domain, e.g. api.myapp.com
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upload size — needed for video file uploads (MMIA) ────
    client_max_body_size 500M;

    # ── Timeouts — video processing can take 60-120s on CPU ───
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;

    # ── Redirect HTTP → HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name fastmodels.resumetex.live;

        # Let's Encrypt ACME challenge (Certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name fastmodels.resumetex.live;

        # Certbot will place your certificates here
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Proxy all requests to gateway ─────────────────────
        location / {
            proxy_pass         http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade support (required for /ws/* endpoints)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Required for large file uploads (MMIA video)
            proxy_request_buffering off;
        }
    }
}